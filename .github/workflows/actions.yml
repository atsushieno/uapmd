name: build dist

on:
  push:
  pull_request:

jobs:
  build:
    name: 'build on ${{ matrix.os }}'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-13, macos-14, windows-latest]
    steps:
    - name: checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: apt update and install
      if: matrix.os == 'ubuntu-24.04'
      run: |
        sudo apt-get update
        sudo apt install gcc-14

    - name: setup build on osx
      if: startsWith(matrix.os, 'macos')
      run: |
        cmake -B build -G Xcode
    - name: setup build on non-osx
      # GitHub Actions YAML parser is stupid; it fails to parse ! startsWith(matrix.os, 'macos')
      if: startsWith(matrix.os, 'macos') != 'true'
      run: |
        cmake -B build

    - name: build
      run: cmake --build build

    - name: upload build failure logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-${{ matrix.os }}
        path: |
          build

